<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    const num1 = +prompt('请输入第一个数字')
    const num2 = +prompt('请输入第二个数字')
    let sp = prompt('请输入+-*/运算符')
    switch (sp) {
      case '+':
        alert(`两个数的加法操作是${num1 + num2}`)
        break;
      case '-':
        alert(`两个数的减法操作是${num1 - num2}`)
        break;
      case '*':
        alert(`两个数的乘法操作是${num1 * num2}`)
        break;
      case '/':
        if (num2 == 0) {
          alert('除数不能为0')
        }
        else {
          alert(`两个数的除法操作是${num1 / num2}`)
        }
        break;
      default:
        alert('请输入正确的运算符')
        break;
    }
    // while语句
    // let i = 1
    // while (i <= 10) {
    //   document.write('你是傻子')
    //   i++
    // }
    //页面输出1-100
    let i = 1
    while (i <= 100) {
      document.write(i + '<br>')
      i++
    }
  </script>
</body>

</html>
