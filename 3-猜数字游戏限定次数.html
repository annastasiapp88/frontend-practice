<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    function getRandom(N, M) {
      return Math.floor(Math.random() * (M - N + 1) + N)
    }
    let random = getRandom(1, 10)
    console.log(random);
    let flag = true
    for (let i = 1; i <= 3; i++) {
      let num = +prompt(`请输入第${i}次猜的数字`)
      if (num > random) {
        alert(`你猜大了`)
      }
      else if (num < random) {
        alert(`你猜小了`)
      }
      else {
        flag = false
        alert(`恭喜猜对了`)
        break

      }
    }
    if (flag) {
      alert(`很遗憾次数用完了`)
    }

  </script>
</body>

</html>
